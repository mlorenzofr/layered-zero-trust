  argoCD:
    resourceHealthChecks:
    - check: |
        local hs = {}
        if obj.status ~= nil and obj.status.phase ~= nil then
          if obj.status.phase == "Bound" then
            hs.status = "Healthy"
            hs.message = "PVC is bound"
          elseif obj.status.phase == "Pending" then
            hs.status = "Healthy"
            hs.message = "PVC is pending"
          elseif obj.status.phase == "Lost" then
            hs.status = "Degraded"
            hs.message = "PVC is lost"
          else
            hs.status = "Progressing"
            hs.message = obj.status.phase
          end
        else
          hs.status = "Progressing"
          hs.message = "Waiting for PVC status"
        end
        return hs
      kind: PersistentVolumeClaim
    - check: |
        local hs = {}
        hs.status = "Progressing"
        hs.message = "Waiting for status update."
        if obj.status ~= nil then
          if obj.status.conditions ~= nil then
            for i, condition in ipairs(obj.status.conditions) do
              if condition.type == "Done" and condition.status == "True" then
                hs.status = "Healthy"
                hs.message = condition.message
                return hs
              end
              if condition.type == "Started" and condition.status == "True" then
                hs.status = "Progressing"
                hs.message = "Realm import is running"
                return hs
              end
              if condition.type == "HasErrors" and condition.status == "True" then
                hs.status = "Degraded"
                hs.message = condition.message
                return hs
              end
            end
          end
        end
        return hs
      group: k8s.keycloak.org
      kind: KeycloakRealmImport
