# Hub Configuration (Default)
# This is the default configuration with optional Layer 1 components (Quay, RHTAS) commented out
# To deploy with optional components, uncomment the relevant sections below

# This spire config is required to fix a bug in the zero-trust-workload-identity-manager operator
spire:
  oidcDiscoveryProvider:
    ingress:
      enabled: true
      annotations:
        route.openshift.io/termination: reencrypt
        route.openshift.io/destination-ca-certificate-secret: spire-bundle

# ===========================================================================
# Global registry configuration (shared by qtodo and supply-chain)
# Define once here; both charts fall back to global.registry.* when their
# local registry values are empty.  Per-app overrides still take precedence.
#
# The gen-byo-container-registry-variants.py script uncomments the matching
# OPTION block for each variant.
# ===========================================================================
# OPTION 1: Built-in Quay Registry
# global:
#   registry:
#     enabled: true
#     domain: quay-registry-quay-quay-enterprise.apps.{{ .Values.global.clusterDomain }}
#     repository: ztvp/qtodo
#     user: quay-user
#     vaultPath: "secret/data/hub/infra/quay/quay-users"
#     passwordVaultKey: "quay-user-password"
# OPTION 2: BYO/External Registry (quay.io, ghcr.io, etc.)
# global:
#   registry:
#     enabled: true
#     domain: quay.io
#     repository: your-org/qtodo
#     user: your-username
#     vaultPath: "secret/data/hub/infra/registry/registry-user"
#     passwordVaultKey: "registry-password"
# OPTION 3: Embedded OpenShift Registry
# global:
#   registry:
#     enabled: true
#     domain: default-route-openshift-image-registry.apps.{{ .Values.global.clusterDomain }}
#     repository: ztvp/qtodo
#     user: _token
#     vaultPath: "secret/data/hub/infra/registry/registry-user"
#     passwordVaultKey: "registry-password"

global:
  registry:
    enabled: true
    domain: "quay-registry-quay-quay-enterprise.apps.{{ .Values.global.clusterDomain }}"
    # Placeholders auto-replaced by the generator (supply-chain defines org=ztvp, image_name=qtodo)
    repository: ztvp/qtodo
    user: quay-user
    vaultPath: "secret/data/hub/infra/quay/quay-users"
    passwordVaultKey: "quay-user-password"

