---
clusterGroup:
  applications:
    vault:
      jwt:
        roles:
          - name: rhtas
            audience: rhtas
            subject: spiffe://apps.{{ $.Values.global.clusterDomain }}/ns/trusted-artifact-signer/sa/rhtas
            policies:
              - hub-infra-rhtas-jwt-secret
    qtodo:
      overrides:
        - name: app.oidc.authServerUrl
          value: https://login.microsoftonline.com/6047c7e9-b2ad-488d-a54e-dc3f6be6a7ee/v2.0
        - name: app.oidc.clientId
          value: ea544083-9606-48ae-9118-d66bfbc7c9ae
        - name: app.oidc.clientSecret.enabled
          value: true
        - name: app.oidc.clientSecret.vaultPath
          value: secret/data/apps/qtodo/qtodo-oidc-entraid
    trusted-artifact-signer:
      overrides:
        - name: rhtas.zeroTrust.email.issuer
          value: https://login.microsoftonline.com/6047c7e9-b2ad-488d-a54e-dc3f6be6a7ee/v2.0
        - name: rhtas.fulcio.oidcIssuers.email.clientID
          value: ea544083-9606-48ae-9118-d66bfbc7c9ae
