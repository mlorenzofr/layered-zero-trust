        - name: rhtpa.zeroTrust.oidc.clients.frontend.clientId
          value: ea544083-9606-48ae-9118-d66bfbc7c9ae
        - name: rhtpa.zeroTrust.oidc.clients.cli.clientId
          value: ea544083-9606-48ae-9118-d66bfbc7c9ae
        - name: rhtpa.zeroTrust.oidc.clients.cli.secretVaultPath
          value: secret/data/hub/infra/rhtpa/rhtpa-entraid-ui
    supply-chain:
      overrides:
        - name: rhtas.spire.enabled
          value: false
        - name: rhtas.oidc.enabled
          value: true
        - name: rhtas.oidc.url
