{{- $clusters := .Values.acmManagedClusters.clusters | default list }}
{{- range $clusters }}
---
apiVersion: cluster.open-cluster-management.io/v1
kind: ManagedCluster
metadata:
  name: {{ .name }}
  labels:
    clusterGroup: {{ $.Values.acmManagedClusters.label }}
    cluster.open-cluster-management.io/clusterset: {{ $.Values.acmManagedClusters.label }}
    {{- toYaml .labels | nindent 4 }}
spec:
  hubAcceptsClient: true
{{- end }}