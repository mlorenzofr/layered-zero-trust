{{- if and .Values.esoWebhookCheck.enabled (eq (.Values.rhbk.defaultDenyNetworkPolicy.enabled | toString) "true") }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: wait-for-eso-webhook-netpol
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  podSelector:
    matchLabels:
      app: wait-for-eso-webhook
  policyTypes:
  - Egress
  egress:
  - ports:
    - protocol: UDP
      port: 5353
    - protocol: TCP
      port: 5353
    to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: openshift-dns
  - ports:
    - protocol: TCP
      port: 6443
{{- end }}
