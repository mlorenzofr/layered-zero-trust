{{- if .Values.esoWebhookCheck.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: wait-for-eso-webhook
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: wait-for-eso-webhook-{{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
rules:
- apiGroups: ["discovery.k8s.io"]
  resources: ["endpointslices"]
  verbs: ["list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: wait-for-eso-webhook-{{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: wait-for-eso-webhook-{{ .Release.Namespace }}
subjects:
- kind: ServiceAccount
  name: wait-for-eso-webhook
  namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: wait-for-eso-webhook
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        app: wait-for-eso-webhook
    spec:
      serviceAccountName: wait-for-eso-webhook
      restartPolicy: Never
      containers:
      - name: wait
        image: {{ .Values.esoWebhookCheck.image }}
        command:
        - /bin/bash
        - -ce
        - |
          echo "Waiting for ESO webhook endpoints in external-secrets namespace..."
          until oc get endpointslice -n external-secrets \
            -l=kubernetes.io/service-name=external-secrets-webhook \
            -o jsonpath='{.items[0].endpoints[0].addresses[0]}' 2>/dev/null
          do
            echo "ESO webhook not ready, retrying in 5s..."
            sleep 5
          done
          echo "ESO webhook is ready."
{{- end }}
