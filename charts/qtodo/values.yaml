# Default values for qtodo
global:
  localClusterDomain: apps.example.com
  secretStore:
    name: "vault-backend"
    kind: "ClusterSecretStore"
  registry:
    enabled: false
    domain: ""
    repository: ""
    user: ""
    vaultPath: ""
    passwordVaultKey: ""

# QTodo application configuration
app:
  name: qtodo
  images:
    main:
      name: quay.io/validatedpatterns/qtodo
      version: latest
      # Modified to Always to force a pull so we can test changes to the container image without requiring manual deletion of images or restarts of argo
      pullPolicy: Always
      registry:
        # Set to true to create registry auth secret for image pulls
        # (also enabled when global.registry.enabled=true)
        auth: false
        secretName: qtodo-registry-auth
        # Falls back to global.registry.user
        user: ""
        # domain: registry.example.com  # REQUIRED when auth is enabled
        # Vault path and key for registry password (set for your scenario)
        vaultPath: ""
        passwordVaultKey: ""
    spiffeHelper:
      name: registry.redhat.io/zero-trust-workload-identity-manager/spiffe-helper-rhel9
      version: v0.10.0
      pullPolicy: IfNotPresent
    spiffeVaultClient:
      name: registry.redhat.io/ubi9/python-311
      version: latest
      pullPolicy: IfNotPresent
    postgresql:
      name: registry.redhat.io/rhel8/postgresql-16
      version: latest
      pullPolicy: IfNotPresent

  oidc:
    enabled: false  # Will be enabled when SPIFFE is enabled
    authServerUrl: ""
    realm: "ztvp"
    clientId: "qtodo-app"
    applicationType: "web-app"
    authenticatedPaths: "/*"
    authenticatedPolicy: "authenticated"
    # Federated client assertion using SPIFFE JWT SVID
    clientAssertion:
      enabled: true
      jwtTokenPath: "/svids/jwt.token"
    clientSecret:
      enabled: false
      name: "oidc-client-secret"
      vaultPath: "secret/data/apps/qtodo/qtodo-oidc-client"

  spire:
    enabled: true   # Enable SPIFFE + OIDC integration by default
    sidecars: true

  # Vault configuration for SPIFFE integration
  # Uses SPIFFE JWT to authenticate and fetch DB password
  vault:
    url: ""
    role: "qtodo"
    # JWT Audience (auto-generated if not set)
    # audience: "api://client-id"
    # QTodo secrets path (app-level isolation)
    secretPath: "secret/data/apps/qtodo/qtodo-db"

  # Seed image Job: mirrors the upstream qtodo image into the configured
  # registry so the deployment can pull before the supply-chain pipeline runs.
  seedImage:
    enabled: false
    source: "quay.io/validatedpatterns/qtodo:latest"
    tag: "latest"
    image: "registry.redhat.io/openshift4/ose-tools-rhel9:latest"

  # Truststore configuration for Java CA certificates (PKCS12 format)
  truststore:
    enabled: true
    secretName: "qtodo-truststore-secret"
    # QTodo truststore password path (app-level isolation)
    vaultPath: "secret/data/apps/qtodo/qtodo-truststore"

  # User-Defined Network (UDN) configuration for network isolation
  # Provides layer 2/3 network segmentation following Zero Trust principles
  udn:
    enabled: false
    # Network name
    name: qtodo-isolated-network
    # NetworkAttachmentDefinition name
    nadName: qtodo-udn-nad
    # Topology: Layer2 or Layer3
    # Layer2: Same subnet, pods can communicate directly
    # Layer3: Different subnets per node, requires routing
    topology: Layer2
    # CIDR for the UDN subnet (Layer2 only)
    subnet: "10.100.0.0/16"
    # Join subnet (for Layer3, optional)
    # joinSubnet: "100.64.0.0/16"
    # MTU for the network (default: 1400 to avoid fragmentation)
    mtu: 1400
    # IPAM configuration
    ipam:
      type: static
    # Network Policy for UDN
    # UDN requires policies on both primary (cluster network) and secondary (UDN) interfaces
    networkPolicy:
      # Enable network policies on the UDN
      enabled: true
      # Allowed egress destinations from qtodo pods on the UDN
      egress:
        # DNS resolution
        dns:
          enabled: true
          port: 5353
          namespace: openshift-dns
        # PostgreSQL database
        postgresql:
          enabled: true
          port: 5432
        # Vault for secrets (via primary network, not UDN)
        vault:
          enabled: true
          port: 8200
          namespace: vault
        # Allow HTTPS connections to any destination, used for OIDCs (via primary network for external route)
        https:
          enabled: true
          port: 443
      # Allowed ingress sources to qtodo pods on the UDN
      ingress:
        # OpenShift router (via primary network, not UDN)
        router:
          enabled: true
          port: 8080

# PostgreSQL database configuration
postgresql:
  name: qtodo-db

  # Database configuration
  auth:
    secretName: qtodo-db-secret
    database: tasks
    username: qtodo_user
    # QTodo DB password path (app-level isolation)
    passwordVaultKey: secret/data/apps/qtodo/qtodo-db
